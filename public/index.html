<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog Discovery — QEP Books</title>
  <link rel="stylesheet" href="catalog.css">
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-content">

        <div class="sidebar-nav">
          <a href="https://qep-isbn-lookup.onrender.com/" class="sidebar-nav-link">
            ← Back to Lookup
          </a>
        </div>

        <div class="sidebar-section">
          <h2 class="sidebar-title">Catalog Discovery</h2>
        </div>

        <div class="sidebar-section">
          <label for="publisher-select">Publisher</label>
          <select id="publisher-select" class="cd-select">
            <option value="PRH">Penguin Random House</option>
          </select>
        </div>

        <div class="sidebar-section">
          <label>Categories</label>
          <div class="cd-category-list" id="category-list">
            <div class="cd-list-msg">Loading categories…</div>
          </div>
        </div>

        <div class="filter-group">
          <label class="cd-check">
            <input type="checkbox" id="coming-soon-toggle">
            Coming Soon only
          </label>
        </div>

        <button id="load-btn" class="btn-primary" disabled onclick="loadCatalog()">
          Load Catalog
        </button>

        <div id="filters-panel" class="sidebar-section hidden">

          <div class="filter-group">
            <label for="cd-search">Search</label>
            <input type="text" id="cd-search" class="cd-input" placeholder="Title or author…" oninput="applyFilters()">
          </div>

          <div class="filter-group">
            <label>Format</label>
            <div id="format-checkboxes" class="cd-check-group">
              <label class="cd-check"><input type="checkbox" value="hardcover"> Hardcover</label>
              <label class="cd-check"><input type="checkbox" value="trade paperback"> Trade Paperback</label>
              <label class="cd-check"><input type="checkbox" value="mass market"> Mass Market</label>
              <label class="cd-check"><input type="checkbox" value="ebook"> eBook</label>
            </div>
          </div>

          <button class="btn-primary" onclick="applyFilters()" style="margin-top:0.25rem">
            Apply Filters
          </button>

        </div>

      </div>
    </aside>

    <!-- Sidebar spacer -->
    <div class="sidebar-spacer"></div>

    <!-- Main content -->
    <main class="main-content">

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <h2>QEP Catalog Discovery</h2>
        <p>Select a category from the left, then click <strong>Load Catalog</strong>.</p>
        <p class="sub">Titles not already in your Shopify store will appear here.</p>
      </div>

      <!-- Loading -->
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <span id="loading-text">Loading catalog…</span>
      </div>

      <!-- Results -->
      <div id="results-area" class="hidden">

        <div class="results-toolbar">
          <label class="cd-check">
            <input type="checkbox" id="select-all-results" onchange="onSelectAllResults(this)">
            Select All
          </label>
          <div id="stats-bar" class="stats-bar"></div>
          <button id="bulk-add-btn" class="btn-bulk-add" onclick="addSelectedToShopify()">
            Add Selected to Shopify
          </button>
        </div>

        <div id="title-list" class="title-list"></div>

        <div id="no-results" class="no-results hidden">
          No titles found for the selected category.
        </div>

      </div>

    </main>
  </div>

  <script src="catalog.js"></script>
</body>
</html>
